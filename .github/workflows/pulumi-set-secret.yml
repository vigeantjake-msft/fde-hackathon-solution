# WARNING: This file is autogenerated - changes will be overwritten when regenerated by https://github.com/microsoft/fde-mgmt
name: Pulumi Set Secret

on:
  workflow_dispatch:
    inputs:
      project:
        required: false
        type: string
        default: app
        description: Name of a Pulumi project under infra/ (e.g. "app", "platform").
      pulumi-stack-name:
        required: true
        type: choice
        options:
          - staging
          - production
        description: The name of the Pulumi stack to set the secret in
      pulumi-secret-name:
        required: true
        type: string
        description: The name of the secret to set in the Pulumi stack
      gh-secret-unique-id:
        required: true
        type: string
        description: The unique identifier attached to the temporary GitHub secret

jobs:
  set-secret:
    name: Pulumi Set Secret (${{ inputs.pulumi-stack-name }})
    runs-on: ubuntu-latest
    permissions: {}
    environment: ${{ inputs.pulumi-stack-name }}
    concurrency:
      group: pulumi-set-secret-${{ inputs.project }}-${{ inputs.pulumi-stack-name }}-${{ inputs.pulumi-secret-name }}
      cancel-in-progress: false
    env:
      CHECKOUT_REF: main

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ env.CHECKOUT_REF }}
          # This token is sync'd to downstream repos via the gen-tokens.yml workflow in fde-mgmt
          token: ${{ secrets.PULL_REQUEST_AUTOMATION_GITHUB_TOKEN }}

      - name: Resolve project
        id: resolve
        uses: ./.github/actions/common/pulumi-resolve-projects
        with:
          project: ${{ inputs.project }}

      - id: vars
        run: |
          PROJECT_DIR="${{ fromJson(steps.resolve.outputs.projects)[0] }}"
          echo "pulumi-project-dir=$PROJECT_DIR" >> $GITHUB_OUTPUT
          echo "branch-name=pulumi_${PROJECT_DIR//\//_}_${{ inputs.pulumi-stack-name }}_${{ inputs.pulumi-secret-name }}_${{ github.run_id }}" >> $GITHUB_OUTPUT
          echo "pr-title=[bot] Set secret ${{ inputs.pulumi-secret-name }} in ${PROJECT_DIR} ${{ inputs.pulumi-stack-name }}" >> $GITHUB_OUTPUT

      - name: Install Pulumi CLI
        uses: pulumi/actions@8582a9e8cc630786854029b4e09281acd6794b58 # v6

      # The secret is a JSON object with a unique ID and the secret itself. It looks like:
      # {"unique_id":"some-unique-id","secret_value":"my-secret-value"}
      # To ensure we're running this script with the expected secret, check that the unique ID
      # in the secret object matches the unique ID passed as an input to this workflow.
      - name: Validate and extract secret value
        id: extract-secret
        run: |
          unique_id="$(jq -r '.unique_id' <<< "${SECRET_OBJECT}")"

          if [ "$unique_id" != "${{ inputs.gh-secret-unique-id }}" ];
          then
            echo "Error: Expected unique ID ${{ inputs.gh-secret-unique-id }} but received $unique_id. Aborting."
            exit 1
          fi

          secret_value="$(jq -r '.secret_value' <<< "${SECRET_OBJECT}")"
          echo "::add-mask::${secret_value}"
          echo "secret-value=$secret_value" >> $GITHUB_OUTPUT
        env:
          SECRET_OBJECT: ${{ secrets.PULUMI_TEMP_SECRET_OBJECT }}

      - name: Delete temporary secret
        if: always()
        run: |
          if ! gh secret delete PULUMI_TEMP_SECRET_OBJECT --repo ${{ github.repository }}; then
            echo "Warning: Failed to delete temporary secret PULUMI_TEMP_SECRET_OBJECT in repository ${{ github.repository }}. Please remove it manually."
          fi
        env:
          # This token is sync'd to downstream repos via the gen-tokens.yml workflow in fde-mgmt
          GITHUB_TOKEN: ${{ secrets.SECRETS_AUTOMATION_GITHUB_TOKEN }}

      # Note: We don't need to log into the actual Pulumi backend to set a secret;
      # we just need the stack to be initialized and selected. In this case, we
      # log into the "local" backend -- which is just a local file -- and then
      # initialize the stack as if it's being seen for the first time.
      - name: Set secret
        working-directory: ${{ steps.vars.outputs.pulumi-project-dir }}
        run: |
          pulumi login --local
          pulumi stack init ${{ inputs.pulumi-stack-name }}
          pulumi config set --secret ${{ inputs.pulumi-secret-name }} "$SECRET_VALUE"
        env:
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_ENCRYPTION_KEY }}
          SECRET_VALUE: ${{ steps.extract-secret.outputs.secret-value }}

      - name: Commit and push changes
        working-directory: ${{ steps.vars.outputs.pulumi-project-dir }}
        run: |
          git config user.name "microsoft-fde-bot[bot]"
          git config user.email "250016809+microsoft-fde-bot[bot]@users.noreply.github.com"
          git checkout -b ${{ steps.vars.outputs.branch-name }}
          git add Pulumi.${{ inputs.pulumi-stack-name }}.yml
          git commit -m "${{ steps.vars.outputs.pr-title }}"
          git push --set-upstream origin ${{ steps.vars.outputs.branch-name }}

      - name: Create pull request
        env:
          GITHUB_TOKEN: ${{ secrets.PULL_REQUEST_AUTOMATION_GITHUB_TOKEN }}
          GITHUB_WORKFLOW_NAME: ${{ github.workflow }}
          GITHUB_WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          body="## Pulumi Secret

          **Stack:** \`${{ inputs.pulumi-stack-name }}\`
          **Secret:** \`${{ inputs.pulumi-secret-name }}\`

          ---
          This PR was automatically created by [$GITHUB_WORKFLOW_NAME]($GITHUB_WORKFLOW_RUN_URL)."

          gh pr create \
            --base "${{ env.CHECKOUT_REF }}" \
            --head "${{ steps.vars.outputs.branch-name }}" \
            --title "${{ steps.vars.outputs.pr-title }}" \
            --body "$body"
