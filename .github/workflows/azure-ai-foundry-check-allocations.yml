# WARNING: This file is autogenerated - changes will be overwritten when regenerated by https://github.com/microsoft/fde-mgmt
name: Azure AI Foundry Check Quota Allocations

on:
  workflow_dispatch:
    inputs:
      location:
        description: 'Azure region to check (e.g., uksouth, eastus)'
        required: true
        type: string

jobs:
  check-deployments:
    name: Check Azure Cognitive Services Quota
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    environment: production

    steps:
      - name: Azure Login via OIDC
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID || secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID || secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID || secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Show Regional Quota & Allocation
        env:
          SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID || secrets.AZURE_SUBSCRIPTION_ID }}
          LOCATION: ${{ inputs.location }}
        run: |
          echo ""
          echo "=================================================="
          echo "Location: $LOCATION"
          echo "Subscription: $SUBSCRIPTION_ID"
          echo "=================================================="
          echo ""
          echo "Quota Allocation (All Models):"
          echo "---------------------------------------------------"
          az rest \
            --url "https://management.azure.com/subscriptions/${SUBSCRIPTION_ID}/providers/Microsoft.CognitiveServices/locations/${LOCATION}/usages?api-version=2023-05-01" \
            --query "value[?contains(name.value, 'OpenAI')].{Name:name.localizedValue, Current:currentValue, Limit:limit}" \
            --output table
