# WARNING: This file is autogenerated - changes will be overwritten when regenerated by https://github.com/microsoft/fde-mgmt
name: Check Protected Files

on:
  pull_request:
    branches:
      - main

jobs:
  check-protected-files:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check for protected file modifications
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d
        id: protected
        with:
          filters: .github/fde-protected-paths.yml
          list-files: shell

      - name: Report violations
        if: github.event.pull_request.user.login != 'microsoft-fde-bot[bot]' && steps.protected.outputs.protected == 'true'
        run: |
          echo "::error::Protected files were modified in this pull request."
          echo ""
          echo "The following files are managed by fde-mgmt and should not be modified directly."
          echo "Changes to these files will be overwritten by the next sync."
          echo ""
          for f in ${{ steps.protected.outputs.protected_files }}; do
            echo "  - $f"
          done
          echo ""
          echo "To make changes, submit them to https://github.com/microsoft/fde-mgmt or the appropriate source repository."
          exit 1
