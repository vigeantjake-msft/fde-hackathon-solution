# WARNING: This file is autogenerated - changes will be overwritten when regenerated by https://github.com/microsoft/fde-mgmt

# One-time setup workflow to create the Pulumi backend and environment secrets that allows us to deploy to
# Azure from GitHub Actions using a Managed Identity and OIDC.
name: Pulumi Setup

on:
  workflow_dispatch:
    inputs:
      github-environment:
        required: true
        type: choice
        options:
          - production
        default: production
        description: The name of the GitHub deploy environment we're setting up

      azure-subscription-id:
        required: true
        type: string
        description: The ID of the Azure subscription we are giving this repository access to deploy to
      azure-tenant-id:
        required: true
        type: string
        description: The ID of the Azure tenant we are giving this repository access to deploy to
      azure-client-id:
        required: true
        type: string
        description: The client ID of the Managed Identity already created in the target Azure subscription
      azure-resource-group-name:
        required: true
        type: string
        description: The name of the resource group where the Managed Identity was created in the target Azure subscription

env:
  PULUMI_PROJECT_DIR: tools/github-actions-azure
  PULUMI_STACK_NAME: temp
  PULUMI_CONFIG_PASSPHRASE: not-used-but-needs-to-be-set

jobs:
  setup:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write
      issues: write

    environment: ${{ inputs.github-environment }}

    env:
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ inputs.azure-client-id }}
      ARM_TENANT_ID: ${{ inputs.azure-tenant-id }}
      ARM_SUBSCRIPTION_ID: ${{ inputs.azure-subscription-id }}

      MANAGED_IDENTITY_CLIENT_ID: ${{ inputs.azure-client-id }}
      MANAGED_IDENTITY_RESOURCE_GROUP_NAME: ${{ inputs.azure-resource-group-name }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version-file: ${{ env.PULUMI_PROJECT_DIR }}/pyproject.toml

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version-file: ${{ env.PULUMI_PROJECT_DIR }}/pyproject.toml

      - name: Login to Azure
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ inputs.azure-client-id }}
          tenant-id: ${{ inputs.azure-tenant-id }}
          subscription-id: ${{ inputs.azure-subscription-id }}

      - name: Az info
        run: |
          az version
          az account show

      - name: Install Pulumi CLI
        uses: pulumi/actions@8582a9e8cc630786854029b4e09281acd6794b58 # v6

      - name: Init stack
        run: |
          pulumi login --local
          pulumi stack init ${{ env.PULUMI_STACK_NAME }}
        working-directory: ${{ env.PULUMI_PROJECT_DIR }}

      - name: Get preview
        id: get-preview
        uses: ./.github/actions/common/pulumi-preview
        with:
          pulumi-project-dir: ${{ env.PULUMI_PROJECT_DIR }}
          pulumi-stack-name: ${{ env.PULUMI_STACK_NAME }}
          head-ref-sha: ${{ github.sha }}

      - name: Wait for manual approval
        uses: trstringer/manual-approval@74d99dff7380e3e4b122d4ededcbca2b6ce59367 # v1
        id: manual-approval
        timeout-minutes: 10
        with:
          secret: ${{ secrets.GITHUB_TOKEN }}
          approvers: ${{ github.actor }}
          minimum-approvals: 1
          issue-title: Setup Pulumi backend for ${{ inputs.github-environment }} environment
          issue-body-file-path: ${{ steps.get-preview.outputs.preview-markdown-filepath }}
          fail-on-denial: true

      - name: Deploy the stack
        run: |
          pulumi up \
            --yes \
            --non-interactive \
            --skip-preview
        working-directory: ${{ env.PULUMI_PROJECT_DIR }}

      - name: Comment on issue
        uses: ./.github/actions/common/pulumi-comment-stack-outputs
        with:
          pulumi-project-dir: ${{ env.PULUMI_PROJECT_DIR }}
          pulumi-stack-name: ${{ env.PULUMI_STACK_NAME }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ steps.manual-approval.outputs.issue-number }}
