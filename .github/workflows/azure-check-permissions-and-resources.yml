# WARNING: This file is autogenerated - changes will be overwritten when regenerated by https://github.com/microsoft/fde-mgmt
name: Azure Check Permissions and Resources

on:
  workflow_dispatch:

jobs:
  check-permissions:
    name: Check Permissions
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Azure Login via OIDC
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID || secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID || secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID || secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Check Azure Permissions and Resources
        run: |
          ./tools/scripts/azure-check-permissions-and-resources.sh \
            --client-id ${{ vars.AZURE_CLIENT_ID || secrets.AZURE_CLIENT_ID }} \
            --show-resources
