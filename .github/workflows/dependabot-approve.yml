# WARNING: This file is autogenerated - changes will be overwritten when regenerated by https://github.com/microsoft/fde-mgmt
name: Dependabot Approve

on:
  schedule:
    - cron: '5 4 * * 1'
  pull_request:
    types:
      - opened
    branches:
      - main

jobs:
  # Dependabot has its own set of secrets. Unfortunately, GitHub doesn't support
  # designating existing Actions secrets as safe-to-be-used by Dependabot, so we
  # have to explicitly copy them over. This job runs weekly on a schedule to ensure
  # that Dependabot always has the latest secrets.
  copy-secrets:
    if: github.event_name == 'schedule'
    permissions: {}
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Copy secrets
        run: |
          gh secret set \
            PULUMI_CONFIG_ENCRYPTION_KEY \
            --repo $GITHUB_REPOSITORY \
            --body "$PULUMI_CONFIG_ENCRYPTION_KEY" \
            --app dependabot
        env:
          GITHUB_TOKEN: ${{ secrets.SECRETS_AUTOMATION_GITHUB_TOKEN }}
          PULUMI_CONFIG_ENCRYPTION_KEY: ${{ secrets.PULUMI_CONFIG_ENCRYPTION_KEY }}

  changes:
    runs-on: ubuntu-latest
    outputs:
      unexpected: ${{ steps.changes.outputs.unexpected }}
    permissions:
      pull-requests: read
    steps:
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d
        id: changes
        with:
          predicate-quantifier: every
          filters: |
            unexpected:
              - '!**/pyproject.toml'
              - '!**/uv.lock'
              - '!**/package.json'
              - '!**/pnpm-lock.yaml'
              - '!.github/workflows/*.yml'
              - '!.github/actions/**/action.yml'

  metadata:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' &&
      github.event.action == 'opened' &&
      github.event.pull_request.user.login == 'dependabot[bot]'
    outputs:
      update-type: ${{ steps.metadata.outputs.update-type }}
    permissions:
      pull-requests: read
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@21025c705c08248db411dc16f3619e6b5f9ea21a # v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

  approve-and-set-automerge:
    needs:
      - changes
      - metadata
    if: |
      needs.changes.outputs.unexpected == 'false' &&
      needs.metadata.outputs.update-type != 'version-update:semver-major' &&
      github.event_name == 'pull_request' &&
      github.event.action == 'opened' &&
      github.event.pull_request.user.login == 'dependabot[bot]'
    permissions: {}
    runs-on: ubuntu-latest
    steps:
      - name: Approve Dependabot PR
        run: |
          gh pr review $PR_NUMBER --approve --repo $GITHUB_REPOSITORY
          gh pr merge $PR_NUMBER --auto --squash --repo $GITHUB_REPOSITORY
        env:
          GITHUB_TOKEN: ${{ secrets.PULL_REQUEST_AUTOMATION_GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
