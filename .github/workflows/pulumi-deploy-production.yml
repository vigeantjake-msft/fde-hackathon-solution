# WARNING: This file is autogenerated - changes will be overwritten when regenerated by https://github.com/microsoft/fde-mgmt
name: Pulumi Deploy Production

on:
  workflow_dispatch:
    inputs:
      project:
        description: Name of a Pulumi project, or "all" to deploy everything.
        required: true
        type: choice
        # PROJECT_OPTIONS_START
# This list is autogenerated by tools/scripts/pulumi-update-project-options.py -- Do not edit directly
        options:
          - all
# PROJECT_OPTIONS_END
      commit-sha:
        description: The commit sha to deploy. Deploys from the head of the default branch if not provided.
        required: false
        type: string

jobs:
  resolve:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      projects: ${{ steps.resolve.outputs.projects }}
    steps:
      - name: Checkout ${{ inputs.commit-sha || 'HEAD' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.commit-sha || 'main' }}

      - name: Resolve projects
        id: resolve
        uses: ./.github/actions/common/pulumi-resolve-projects
        with:
          project: ${{ inputs.project }}

  deploy:
    needs: resolve
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      issues: write

    environment: production

    strategy:
      matrix:
        pulumi-project-dir: ${{ fromJson(needs.resolve.outputs.projects) }}
      fail-fast: false

    # Don't allow concurrent deploys of the same project
    concurrency:
      group: production-deploy-${{ matrix.pulumi-project-dir }}
      cancel-in-progress: false

    env:
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID || secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID || secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID || secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_STORAGE_ACCOUNT: ${{ vars.PULUMI_AZURE_STORAGE_ACCOUNT || secrets.PULUMI_AZURE_STORAGE_ACCOUNT }}
      PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_ENCRYPTION_KEY }}
      PULUMI_STACK_NAME: production

    steps:
      - name: Checkout ${{ inputs.commit-sha || 'HEAD' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.commit-sha || 'main' }}

      - name: Get head commit sha
        id: head-commit
        run: |
          echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "short-sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Install Pulumi
        uses: pulumi/actions@8582a9e8cc630786854029b4e09281acd6794b58 # v6

      - name: Install Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version-file: ${{ matrix.pulumi-project-dir }}/pyproject.toml

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version-file: ${{ matrix.pulumi-project-dir }}/pyproject.toml

      - name: Login to Azure
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID || secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID || secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID || secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure Pulumi config file exists
        run: |
          if [ ! -f ${{ env.PULUMI_FILENAME }} ]; then
            echo "Pulumi config file ${{ env.PULUMI_FILENAME }} doesn't exist"
            exit 1
          fi
        env:
          PULUMI_FILENAME: ${{ matrix.pulumi-project-dir }}/Pulumi.${{ env.PULUMI_STACK_NAME }}.yml

      - name: Login to Pulumi backend
        uses: ./.github/actions/common/pulumi-login-afd
        with:
          storage-account-name: ${{ vars.PULUMI_AZURE_STORAGE_ACCOUNT || secrets.PULUMI_AZURE_STORAGE_ACCOUNT }}
          afd-endpoint-hostname: ${{ vars.PULUMI_AFD_HOSTNAME || secrets.PULUMI_AFD_HOSTNAME }}
          container-name: ${{ vars.PULUMI_AZURE_STORAGE_CONTAINER || secrets.PULUMI_AZURE_STORAGE_CONTAINER }}

      - name: Refresh stack
        run: |
          pulumi stack select ${{ env.PULUMI_STACK_NAME }} --create
          pulumi refresh --yes
        working-directory: ${{ matrix.pulumi-project-dir }}

      - name: Get preview
        id: get-preview
        uses: ./.github/actions/common/pulumi-preview
        with:
          pulumi-project-dir: ${{ matrix.pulumi-project-dir }}
          pulumi-stack-name: ${{ env.PULUMI_STACK_NAME }}
          head-ref-sha: ${{ steps.head-commit.outputs.sha }}

      - name: Wait for manual approval
        uses: trstringer/manual-approval@74d99dff7380e3e4b122d4ededcbca2b6ce59367 # v1
        id: wait-for-manual-approval
        timeout-minutes: 15
        with:
          secret: ${{ secrets.GITHUB_TOKEN }}
          approvers: ${{ github.actor }}
          minimum-approvals: 1
          issue-title: Deploy ${{ matrix.pulumi-project-dir }}/${{ env.PULUMI_STACK_NAME }} @ ${{ steps.head-commit.outputs.short-sha }}
          issue-body-file-path: ${{ steps.get-preview.outputs.preview-markdown-filepath }}
          fail-on-denial: true

      - name: Deploy stack
        run: |
          pulumi up --skip-preview --yes
        working-directory: ${{ matrix.pulumi-project-dir }}

      - name: Label issue
        if: always()
        run: |
          if [ "${{ steps.wait-for-manual-approval.outcome }}" = "success" ]; then
            label="deployment:approved"
          else
            label="deployment:aborted"
          fi

          gh issue edit ${{ steps.wait-for-manual-approval.outputs.issue-number }} \
            --add-label $label
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
