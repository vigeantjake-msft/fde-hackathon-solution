# WARNING: This file is autogenerated - changes will be overwritten when regenerated by https://github.com/microsoft/fde-mgmt
name: Evals Runner

on:
  workflow_dispatch:
    inputs:
      pr-number:
        description: "PR number to run eval against"
        required: true
        type: number
      head-sha:
        description: "Git SHA to checkout"
        required: true
        type: string
      eval-name:
        description: "Eval to run (kebab-case)"
        required: true
        type: string

jobs:
  run-eval:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write
      statuses: write
    environment: staging
    env:
      BRAINTRUST_API_KEY: ${{ secrets.BRAINTRUST_API_KEY }}
      BRAINTRUST_APP_URL: ${{ vars.BRAINTRUST_APP_URL }}
      AZURE_STORAGE_ACCOUNT: ${{ vars.PULUMI_AZURE_STORAGE_ACCOUNT || secrets.PULUMI_AZURE_STORAGE_ACCOUNT }}
      PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_ENCRYPTION_KEY }}
      PULUMI_PROJECT_DIR: infra/app
      PULUMI_STACK_NAME: staging
    steps:
      - name: Validate HEAD SHA
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CURRENT_HEAD=$(gh api repos/${{ github.repository }}/pulls/${{ inputs.pr-number }} --jq '.head.sha')
          if [ "$CURRENT_HEAD" != "${{ inputs.head-sha }}" ]; then
            echo "::error::head-sha ${{ inputs.head-sha }} does not match current PR HEAD $CURRENT_HEAD"
            exit 1
          fi

      - name: Set commit status (pending)
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '${{ inputs.head-sha }}',
              state: 'pending',
              context: 'eval / ${{ inputs.eval-name }}',
              target_url: `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`
            });

      - name: Checkout PR
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.head-sha }}

      - name: Login to Azure
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID || secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID || secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID || secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Check for Pulumi project
        id: check-pulumi
        run: |
          if [ -d "${{ env.PULUMI_PROJECT_DIR }}" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7

      - name: Install Pulumi
        if: steps.check-pulumi.outputs.exists == 'true'
        uses: pulumi/actions@8582a9e8cc630786854029b4e09281acd6794b58 # v6

      - name: Login to Pulumi backend
        if: steps.check-pulumi.outputs.exists == 'true'
        uses: ./.github/actions/common/pulumi-login-afd
        with:
          storage-account-name: ${{ vars.PULUMI_AZURE_STORAGE_ACCOUNT || secrets.PULUMI_AZURE_STORAGE_ACCOUNT }}
          afd-endpoint-hostname: ${{ vars.PULUMI_AFD_HOSTNAME || secrets.PULUMI_AFD_HOSTNAME }}
          container-name: ${{ vars.PULUMI_AZURE_STORAGE_CONTAINER || secrets.PULUMI_AZURE_STORAGE_CONTAINER }}

      - name: Select Pulumi stack
        if: steps.check-pulumi.outputs.exists == 'true'
        run: |
          pulumi stack select ${{ env.PULUMI_STACK_NAME }}
        working-directory: ${{ env.PULUMI_PROJECT_DIR }}

      - name: Get stack outputs
        id: stack-outputs
        if: steps.check-pulumi.outputs.exists == 'true'
        run: |
          echo "json=$(pulumi stack output --json | jq --compact-output)" >> $GITHUB_OUTPUT
        working-directory: ${{ env.PULUMI_PROJECT_DIR }}

      - name: Show stack outputs
        if: steps.check-pulumi.outputs.exists == 'true'
        run: |
          echo "${{ steps.stack-outputs.outputs.json }}"

      - name: Generate eval trampoline
        env:
          EVAL_NAME: ${{ inputs['eval-name'] }}
          # Emit literal ${{ }} into the generated action.yml
          EXPR_OUTPUT: ${{ '${{ steps.inner.outputs.experiment-url }}' }}
          EXPR_STACK_OUTPUTS: ${{ '${{ inputs.stack-outputs }}' }}
        run: |
          mkdir -p .tmp-eval-trampoline
          cat > .tmp-eval-trampoline/action.yml <<EOF
          name: Eval trampoline
          inputs:
            stack-outputs:
              description: JSON object of Pulumi stack outputs from the staging environment
              required: false
              default: '{}'
          outputs:
            experiment-url:
              value: $EXPR_OUTPUT
          runs:
            using: composite
            steps:
              - name: Run eval
                id: inner
                uses: ./evals/$EVAL_NAME/run
                with:
                  stack-outputs: $EXPR_STACK_OUTPUTS
          EOF
          # Strip leading whitespace so the generated YAML is valid
          sed -i 's/^          //' .tmp-eval-trampoline/action.yml
        shell: bash

      - name: Run eval
        id: eval
        uses: ./.tmp-eval-trampoline
        with:
          stack-outputs: ${{ steps.stack-outputs.outputs.json || '{}' }}

      - name: Set commit status (final)
        if: always()
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const outcome = '${{ steps.eval.outcome }}';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '${{ inputs.head-sha }}',
              state: outcome === 'success' ? 'success' : 'failure',
              context: 'eval / ${{ inputs.eval-name }}',
              target_url: `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`
            });

      - name: Post result comment
        if: always()
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const outcome = '${{ steps.eval.outcome }}';
            const success = outcome === 'success';
            const emoji = success ? ':abacus: :green_circle:' : ':abacus: :red_circle:';
            const experimentUrl = '${{ steps.eval.outputs.experiment-url }}';

            let body = `${emoji} Eval \`${{ inputs.eval-name }}\` ${success ? 'completed' : 'failed'}.`;
            if (experimentUrl) {
              body += `\n\n[View experiment](${experimentUrl})`;
            }
            body += `\n[View workflow run](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID})`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ inputs.pr-number }},
              body: body
            });
