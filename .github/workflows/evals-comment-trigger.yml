# WARNING: This file is autogenerated - changes will be overwritten when regenerated by https://github.com/microsoft/fde-mgmt
name: Evals Comment Trigger

on:
  issue_comment:
    types: [created]

jobs:
  trigger:
    # Only for PR comments starting with /run-eval from authorized users
    if: |
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/run-eval') &&
      contains(fromJson('["MEMBER","OWNER","COLLABORATOR","CONTRIBUTOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      actions: write
    steps:
      - name: Parse comment
        id: parse
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          # Extract eval name following "/run-eval "
          EVAL_NAME=$(echo "$COMMENT_BODY" | sed -n 's|^/run-eval \([a-zA-Z0-9_-]\+\).*|\1|p')

          # Ensure eval name is present and matches the expected pattern
          if [ -z "$EVAL_NAME" ]; then
            echo "::error::No eval name provided. Use '/run-eval <eval-name>' where <eval-name> contains only letters, numbers, '-' or '_'."
            exit 1
          fi

          echo "eval_name=$EVAL_NAME" >> "$GITHUB_OUTPUT"

      - name: Get PR info
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Required for gh CLI auth
        run: |
          PR=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.issue.number }})
          HEAD_SHA=$(echo "$PR" | jq -r '.head.sha')
          HEAD_REPO=$(echo "$PR" | jq -r '.head.repo.full_name')
          BASE_REPO=$(echo "$PR" | jq -r '.base.repo.full_name')

          echo "head_sha=$HEAD_SHA" >> $GITHUB_OUTPUT

          if [ "$HEAD_REPO" != "$BASE_REPO" ]; then
            echo "::error::Cannot run evals on fork PRs"
            exit 1
          fi

      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ steps.pr.outputs.head_sha }}

      - name: Validate eval name
        id: validate
        env:
          EVAL_NAME: ${{ steps.parse.outputs.eval_name }}
        run: |
          # Check that the eval has a run action
          if [ ! -f "evals/${EVAL_NAME}/run/action.yml" ]; then
            # List available evals by finding dirs with run/action.yml
            AVAILABLE_EVALS=$(find evals -path '*/run/action.yml' -exec dirname {} \; 2>/dev/null \
              | xargs -I{} dirname {} \
              | xargs -I{} basename {} \
              | sort \
              | tr '\n' ' ')
            echo "::error::Unknown eval: $EVAL_NAME (no evals/${EVAL_NAME}/run/action.yml found)"
            echo "Available evals: ${AVAILABLE_EVALS:-none}"
            exit 1
          fi

      - name: React to comment
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with: # github-script authenticates with github.token automatically
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: '+1'
            });

      - name: Trigger eval runner
        id: trigger
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Required for gh CLI auth
        run: |
          gh workflow run evals-runner.yml \
            -f pr-number=${{ github.event.issue.number }} \
            -f head-sha=${{ steps.pr.outputs.head_sha }} \
            -f eval-name=${{ steps.parse.outputs.eval_name }}

          # Wait for the run to appear and get its URL
          sleep 5
          RUN_URL=$(gh run list --workflow=evals-runner.yml --limit=1 --json url --jq '.[0].url')
          echo "run_url=$RUN_URL" >> "$GITHUB_OUTPUT"

      - name: Post status comment
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.issue.number }},
              body: ':abacus: :yellow_circle: Running eval `${{ steps.parse.outputs.eval_name }}`...\n\n[View workflow run](${{ steps.trigger.outputs.run_url }})'
            });

      - name: Post failure comment
        if: failure()
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.issue.number }},
              body: `:abacus: :red_circle: Failed to trigger eval. Check the [workflow logs](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}) for details.`
            });
