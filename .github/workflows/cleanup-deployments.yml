# WARNING: This file is autogenerated - changes will be overwritten when regenerated by https://github.com/microsoft/fde-mgmt
#
# Accessing environment-level secrets creates a "deployment" artifact
# on GitHub, even if there wasn't an actual deployment. But we need
# to access these secrets in pull request contexts, so in order
# to avoid noise about deployments happening in the repository, we manually
# delete the deployments associated with the pull request at the end of
# each run of this workflow.
#
# See https://github.com/orgs/community/discussions/36919 for more details.
name: Cleanup Deployments

on:
  workflow_call:
    inputs:
      # The caller passes the entire GitHub context as a stringified JSON object
      github-context:
        required: true
        type: string

# Don't run concurrently for same pull request
concurrency:
  group: cleanup-deployments-${{ fromJson(inputs.github-context).event.pull_request.number }}
  cancel-in-progress: false

jobs:
  cleanup-deployments:
    runs-on: ubuntu-latest
    permissions:
      deployments: write
    steps:
      - name: Cleanup misleading "deployments"
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          PULL_REQUEST_HEAD_REF: ${{ fromJson(inputs.github-context).event.pull_request.head.ref }}
          DEFAULT_BRANCH_NAME: ${{ fromJson(inputs.github-context).event.repository.default_branch }}
        with:
          script: |
            const { PULL_REQUEST_HEAD_REF, DEFAULT_BRANCH_NAME } = process.env;

            // Don't think this is possible, but double check anyway
            if (PULL_REQUEST_HEAD_REF === DEFAULT_BRANCH_NAME)
            {
              throw new Error(`Can't delete deployments for the '${DEFAULT_BRANCH_NAME}' branch.`);
            }

            const deployments = await github.rest.repos.listDeployments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: PULL_REQUEST_HEAD_REF,
            });

            console.log(`Deleting ${deployments.data.length} deployments for ref '${PULL_REQUEST_HEAD_REF}'.`);

            await Promise.all(
              deployments.data.map(async (deployment) => {
                await github.rest.repos.createDeploymentStatus({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  deployment_id: deployment.id,
                  state: 'inactive',
                });
                await github.rest.repos.deleteDeployment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  deployment_id: deployment.id,
                });
              })
            );
