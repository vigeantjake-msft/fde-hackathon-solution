# WARNING: This file is autogenerated - changes will be overwritten when regenerated by https://github.com/microsoft/fde-mgmt
name: Evals Files Changed Trigger

on: pull_request

concurrency:
  group: evals-trigger-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  EVALS_TRIGGER_PATHS_FILE: .github/evals-trigger-paths.yml

jobs:
  get-modified-evals:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      eval-names: ${{ steps.eval-names.outputs.eval-names }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check if paths file exists
        id: paths-file
        run: |
          if [ -f ${{ env.EVALS_TRIGGER_PATHS_FILE }} ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Find evals to run
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d
        if: steps.paths-file.outputs.exists == 'true'
        id: eval-trigger-paths
        with:
          filters: ${{ env.EVALS_TRIGGER_PATHS_FILE }}

      - name: Set eval names as output
        id: eval-names
        run: |
          if [[ "${{ steps.paths-file.outputs.exists }}" == "true" ]]; then
            echo 'eval-names=${{ steps.eval-trigger-paths.outputs.changes }}' >> $GITHUB_OUTPUT
          else
            echo "eval-names=[]" >> $GITHUB_OUTPUT
          fi

  dispatch:
    runs-on: ubuntu-latest
    needs: get-modified-evals
    if: |
      github.event.pull_request.head.repo.full_name == github.repository &&
      needs.get-modified-evals.outputs.eval-names != '[]'
    permissions:
      actions: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        eval-name: ${{ fromJson(needs.get-modified-evals.outputs.eval-names) }}
    steps:
      - name: Dispatch evals-runner
        run: |
          gh workflow run evals-runner.yml \
            -R "${{ github.repository }}" \
            -f pr-number=${{ github.event.pull_request.number }} \
            -f head-sha=${{ github.event.pull_request.head.sha }} \
            -f eval-name=${{ matrix.eval-name }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
