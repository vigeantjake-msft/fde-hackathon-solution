# WARNING: This file is autogenerated - changes will be overwritten when regenerated by https://github.com/microsoft/fde-mgmt
name: CI

on: pull_request

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Get Python version
        id: version
        run: |
          python_version=$(yq '.default_language_version.python' < .pre-commit-config.yaml)

          # Strip 'python' from python_version, e.g. 'python3.12' -> '3.12'
          python_version=${python_version#"python"}

          echo "python-version=$python_version" >> $GITHUB_OUTPUT

      - name: Install Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ steps.version.outputs.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7

      - name: Run pre-commit hooks
        uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1

  infra-resolve:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      projects: ${{ steps.resolve.outputs.projects }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Resolve projects
        id: resolve
        uses: ./.github/actions/common/pulumi-resolve-projects

  infra-test-jobs:
    needs: infra-resolve
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      matrix:
        pulumi-project-dir: ${{ fromJson(needs.infra-resolve.outputs.projects) }}
      fail-fast: false

    defaults:
      run:
        working-directory: ${{ matrix.pulumi-project-dir }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version-file: ${{ matrix.pulumi-project-dir }}/pyproject.toml

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version-file: ${{ matrix.pulumi-project-dir }}/pyproject.toml

      - name: Install dependencies
        run: uv sync --locked

      - name: Run type checks
        run: uv run pyright

      - name: Check for tests folder
        id: check-tests
        run: |
          if [ -d "tests" ]; then
            echo "has-tests=true" >> $GITHUB_OUTPUT
          else
            echo "has-tests=false" >> $GITHUB_OUTPUT
          fi

      - name: Run tests
        if: steps.check-tests.outputs.has-tests == 'true'
        run: uv run pytest

  infra-test:
    runs-on: ubuntu-latest
    permissions: {}
    needs:
      - infra-resolve
      - infra-test-jobs
    if: always()
    steps:
      - if: |
          needs.infra-resolve.outputs.projects != '[]' &&
          needs.infra-test-jobs.result != 'success'
        run: |
          echo "❌ An infra test failed -- see the individual jobs for details"
          exit 1

  py-test-matrix:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      packages: ${{ steps.matrix.outputs.packages }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - id: matrix
        run: |
          # Get all Python packages except those in py/common (which are tested in their own repositories).
          packages=$( \
            jq --compact-output \
              '[.py[] | select(.path | startswith("py/common/") | not)]' \
              .github/workspace-members.json
          )

          echo "Packages:"
          echo "$packages"

          echo "packages=$packages" >> $GITHUB_OUTPUT

  py-test-jobs:
    needs: py-test-matrix
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.py-test-matrix.outputs.packages) }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version-file: py/pyproject.toml

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version-file: py/pyproject.toml

      - name: Install dependencies
        working-directory: ${{ matrix.package.path }}
        run: uv sync --locked

      - name: Run type checks
        working-directory: ${{ matrix.package.path }}
        run: uv run pyright

      - name: Run tests
        working-directory: ${{ matrix.package.path }}
        run: uv run pytest

  py-test:
    runs-on: ubuntu-latest
    permissions: {}
    needs:
      - py-test-matrix
      - py-test-jobs
    if: always()
    steps:
      - if: |
          needs.py-test-matrix.outputs.packages != '[]' &&
          needs.py-test-jobs.result != 'success'
        run: |
          echo "❌ A test suite failed -- see the individual jobs for details"
          exit 1

  ts-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ts
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: ts/package.json

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4
        with:
          package_json_file: ts/package.json

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run all builds
        run: pnpm build-all

      - name: Run all lints
        run: pnpm run-eslint-all

      - name: Run all tests
        run: pnpm test-all
