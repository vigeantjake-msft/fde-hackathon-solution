name: CI

on: pull_request

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Get Python version
        id: version
        run: |
          python_version=$(yq '.default_language_version.python' < .pre-commit-config.yaml)
          python_version=${python_version#"python"}
          echo "python-version=$python_version" >> $GITHUB_OUTPUT

      - name: Install Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ steps.version.outputs.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7

      - name: Run pre-commit hooks
        uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1

  py-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        package:
          - py/common/libs/models
          - py/common/libs/fastapi
          - py/apps/eval-generator
          - py/apps/evals
          - py/libs/evals
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version-file: py/pyproject.toml

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version-file: py/pyproject.toml

      - name: Install workspace dependencies
        working-directory: py
        run: uv sync --locked

      - name: Run type checks
        working-directory: ${{ matrix.package }}
        run: uv run pyright

      - name: Run tests
        working-directory: ${{ matrix.package }}
        run: uv run pytest

  ts-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ts
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: ts/package.json

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4
        with:
          package_json_file: ts/package.json

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run all builds
        run: pnpm build-all

      - name: Run all lints
        run: pnpm run-eslint-all

      - name: Run all tests
        run: pnpm test-all
