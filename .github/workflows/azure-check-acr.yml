# WARNING: This file is autogenerated - changes will be overwritten when regenerated by https://github.com/microsoft/fde-mgmt
name: Azure Check Resource Group ACR

on:
  workflow_dispatch:
    inputs:
      resource_group:
        description: 'Resource group name'
        required: true
        type: string
      date_from:
        description: 'Start date (YYYY-MM-DD, optional - defaults to 364 days ago)'
        required: false
        type: string
      date_to:
        description: 'End date (YYYY-MM-DD, optional - defaults to today)'
        required: false
        type: string

jobs:
  check-costs:
    name: Check Azure Costs
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Azure Login via OIDC
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID || secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID || secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID || secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Show Azure Costs
        run: |
          SCRIPT_ARGS="--resource-group ${{ inputs.resource_group }}"

          [ -n "${{ inputs.date_from }}" ] && SCRIPT_ARGS="$SCRIPT_ARGS --date-from ${{ inputs.date_from }}"
          [ -n "${{ inputs.date_to }}" ] && SCRIPT_ARGS="$SCRIPT_ARGS --date-to ${{ inputs.date_to }}"

          ./tools/scripts/azure-check-acr.sh $SCRIPT_ARGS
