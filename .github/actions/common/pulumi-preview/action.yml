# WARNING: This file is autogenerated - changes will be overwritten when regenerated by https://github.com/microsoft/fde-mgmt
name: Make Pulumi Preview Markdown
description: Generates a Pulumi preview and outputs a Markdown file summarizing the changes

inputs:
  pulumi-project-dir:
    description: The directory of the Pulumi project
    required: true
    type: string
  pulumi-stack-name:
    description: The name of the Pulumi stack
    required: true
    type: string
  head-ref-sha:
    description: The SHA of the head ref of the triggering event
    required: true
    type: string

outputs:
  preview-markdown-filepath:
    description: The filepath to the generated Pulumi preview Markdown file
    value: ${{ steps.vars.outputs.preview-markdown-filepath }}

runs:
  using: composite
  steps:
    - id: vars
      run: |
        echo "pulumi-project-name=$(yq '.name' < $PULUMI_YAML_FILEPATH)" >> $GITHUB_OUTPUT
        echo "preview-json-filepath=${{ env.PREVIEW_JSON_FILEPATH }}" >> $GITHUB_OUTPUT
        echo "preview-markdown-filepath=${{ env.PREVIEW_MARKDOWN_FILEPATH }}" >> $GITHUB_OUTPUT
      env:
        PULUMI_YAML_FILEPATH: ${{ github.workspace }}/${{ inputs.pulumi-project-dir }}/Pulumi.yml
        PREVIEW_JSON_FILEPATH: ${{ github.workspace }}/${{ inputs.pulumi-project-dir }}/preview-${{ inputs.pulumi-stack-name }}.json
        PREVIEW_MARKDOWN_FILEPATH: ${{ github.workspace }}/${{ inputs.pulumi-project-dir }}/preview-${{ inputs.pulumi-stack-name }}.md
      shell: bash

    - name: Get preview as JSON
      run: |
        pulumi preview \
          --stack ${{ inputs.pulumi-stack-name }} \
          --json \
          > ${{ steps.vars.outputs.preview-json-filepath }}
      working-directory: ${{ inputs.pulumi-project-dir }}
      shell: bash

    - name: Show preview diagnostics
      if: always()
      run: cat ${{ steps.vars.outputs.preview-json-filepath }} | jq '.diagnostics'
      working-directory: ${{ inputs.pulumi-project-dir }}
      shell: bash

    - name: Upload JSON preview as artifact
      id: upload
      if: always()
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
      with:
        name: ${{ steps.vars.outputs.pulumi-project-name }}-${{ inputs.pulumi-stack-name }}-pulumi-preview
        path: ${{ steps.vars.outputs.preview-json-filepath }}

    - name: Make preview table
      run: python ${{ github.action_path }}/run.py
      env:
        PULUMI_PROJECT_NAME: ${{ steps.vars.outputs.pulumi-project-name }}
        PULUMI_STACK_NAME: ${{ inputs.pulumi-stack-name }}
        PREVIEW_ARTIFACT_URL: ${{ steps.upload.outputs.artifact-url }}
        PREVIEW_JSON_FILEPATH: ${{ steps.vars.outputs.preview-json-filepath }}
        PREVIEW_MARKDOWN_FILEPATH: ${{ steps.vars.outputs.preview-markdown-filepath }}
        GITHUB_HEAD_REF_SHA : ${{ inputs.head-ref-sha }}
      shell: bash
