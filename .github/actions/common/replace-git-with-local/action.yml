name: Replace Git Dependency with Local Path
description: |
  Discovers all pyproject.toml files in a directory and replaces double-quoted
  "package @ git+https://..." dependencies with a local path reference. This allows
  CI to use a locally checked-out copy of a private repository while local dev can
  continue using git+https with their own credentials.

  Originally built for evals that depend on prompt-evals-cli via git+https — developers
  authenticate with their own GitHub credentials locally, but CI checks out the repo via
  SSH key and needs the dependency rewritten to point at the local checkout.

inputs:
  search-directory:
    description: 'Directory to search for pyproject.toml files (searches recursively)'
    required: true
  package-name:
    description: 'Name of the package to replace (e.g., "prompt-evals")'
    required: true
  local-path:
    description: 'Local path to the checked-out repository'
    required: true
  git-url-pattern:
    description: 'Git URL pattern to match (e.g., "github.com/shared-internal-tools/prompt-evals-cli")'
    required: true

outputs:
  files-found:
    description: 'Number of pyproject.toml files found with matching dependency'
    value: ${{ steps.discover.outputs.files-found }}
  files-modified:
    description: 'Number of files successfully modified'
    value: ${{ steps.replace.outputs.files-modified || 0 }}
  matching-files:
    description: 'Newline-delimited list of matching file paths'
    value: ${{ steps.discover.outputs.matching-files }}

runs:
  using: composite
  steps:
    - name: Validate inputs
      id: validate
      shell: bash
      run: |
        SEARCH_DIR="${{ inputs.search-directory }}"
        LOCAL_PATH="${{ inputs.local-path }}"

        if [[ ! -d "$SEARCH_DIR" ]]; then
          echo "Error: Search directory $SEARCH_DIR not found"
          exit 1
        fi

        if [[ ! -d "$LOCAL_PATH" ]]; then
          echo "Error: Local path $LOCAL_PATH not found"
          exit 1
        fi

        echo "✓ Inputs validated successfully"

    - name: Discover matching pyproject.toml files
      id: discover
      shell: bash
      run: |
        SEARCH_DIR="${{ inputs.search-directory }}"
        PACKAGE_NAME="${{ inputs.package-name }}"
        GIT_URL_PATTERN="${{ inputs.git-url-pattern }}"

        echo "Searching for pyproject.toml files in $SEARCH_DIR with $PACKAGE_NAME dependency..."
        echo ""

        MATCHING_FILES=()

        # Find all pyproject.toml files and check if they contain the dependency
        while IFS= read -r -d '' PYPROJECT_FILE; do
          if grep -q "\"$PACKAGE_NAME @ git+https://.*$GIT_URL_PATTERN" "$PYPROJECT_FILE"; then
            echo "✓ Found: $PYPROJECT_FILE"
            MATCHING_FILES+=("$PYPROJECT_FILE")
          fi
        done < <(find "$SEARCH_DIR" -name "pyproject.toml" -type f -print0)

        echo "Discovery complete: ${#MATCHING_FILES[@]} file(s) found"
        echo "files-found=${#MATCHING_FILES[@]}" >> $GITHUB_OUTPUT

        if [[ ${#MATCHING_FILES[@]} -eq 0 ]]; then
          echo "Warning: No pyproject.toml files found with $PACKAGE_NAME dependency matching pattern: $GIT_URL_PATTERN"
          echo "matching-files=" >> $GITHUB_OUTPUT
        else
          # Output the list of files with newlines
          printf "%s\n" "${MATCHING_FILES[@]}" > /tmp/matching-files.txt
          echo "matching-files<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/matching-files.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        fi

    - name: Replace git dependencies with local path
      id: replace
      if: steps.discover.outputs.matching-files != ''
      shell: bash
      run: |
        PACKAGE_NAME="${{ inputs.package-name }}"
        LOCAL_PATH="${{ inputs.local-path }}"
        GIT_URL_PATTERN="${{ inputs.git-url-pattern }}"

        MODIFIED_COUNT=0
        FAILED_COUNT=0

        # Iterate over the list of matching files from the discover step
        while IFS= read -r PYPROJECT_FILE; do
          [[ -z "$PYPROJECT_FILE" ]] && continue

          echo "Processing: $PYPROJECT_FILE"

          # Replace the git dependency with local path
          sed -i.bak -E \
            "s|\"$PACKAGE_NAME @ git\+https://[^\"]*$GIT_URL_PATTERN[^\"]*\"|\"$PACKAGE_NAME @ file://$LOCAL_PATH\"|g" \
            "$PYPROJECT_FILE"

          # Verify the change
          if grep -q "\"$PACKAGE_NAME @ file://$LOCAL_PATH\"" "$PYPROJECT_FILE"; then
            MODIFIED_COUNT=$((MODIFIED_COUNT + 1))
            echo "  ✓ Replaced: $PACKAGE_NAME @ file://$LOCAL_PATH"
            rm -f "$PYPROJECT_FILE.bak"
          else
            FAILED_COUNT=$((FAILED_COUNT + 1))
            echo "  ✗ Failed to replace dependency"
            mv "$PYPROJECT_FILE.bak" "$PYPROJECT_FILE"
          fi

          echo ""
        done <<< "${{ steps.discover.outputs.matching-files }}"

        echo "Replacement complete:"
        echo "  Successfully modified: $MODIFIED_COUNT file(s)"
        if [[ $FAILED_COUNT -gt 0 ]]; then
          echo "  Failed: $FAILED_COUNT file(s)"
        fi

        echo "files-modified=$MODIFIED_COUNT" >> $GITHUB_OUTPUT

        if [[ $FAILED_COUNT -gt 0 ]]; then
          exit 1
        fi
