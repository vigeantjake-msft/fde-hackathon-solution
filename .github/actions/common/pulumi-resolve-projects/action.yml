name: Resolve Pulumi Projects
description: >
  Discovers Pulumi projects using convention-based layout.
  Mono-project repos use infra/app. Multi-project repos use infra/projects/<name>/.

inputs:
  project:
    description: >
      Name of a Pulumi project (e.g. "platform"), or "all" to discover all projects.
      For mono-project repos (no infra/projects/ directory), only "all" is valid.
    required: false
    default: all

outputs:
  projects:
    description: JSON array of resolved project paths (e.g. '["infra/app"]' or '["infra/projects/platform"]').
    value: ${{ steps.resolve.outputs.projects }}
  is-multi-project:
    description: Whether the repo uses multi-project layout (infra/projects/).
    value: ${{ steps.resolve.outputs.is-multi-project }}

runs:
  using: composite
  steps:
    - name: Resolve project list
      id: resolve
      shell: bash
      run: python "${{ github.action_path }}/run.py" "${{ inputs.project }}"
