name: Setup Prompt Evals CLI
description: |
  Pre-configured action to set up the prompt-evals CLI for use in eval workflows.
  This replaces git+https references with the locally checked-out CLI repository
  and syncs dependencies automatically. Just add this one step to your eval action!

inputs:
  eval-directory:
    description: 'Directory containing the eval pyproject.toml (defaults to ${GITHUB_WORKSPACE}/evals)'
    required: false
    default: ''

outputs:
  eval-directory:
    description: 'The eval directory that was configured'
    value: ${{ steps.setup.outputs.eval-directory }}
  files-modified:
    description: 'Number of files successfully modified'
    value: ${{ steps.replace.outputs.files-modified }}

runs:
  using: composite
  steps:
    - name: Determine eval directory
      id: setup
      shell: bash
      run: |
        if [[ -n "${{ inputs.eval-directory }}" ]]; then
          EVAL_DIR="${{ inputs.eval-directory }}"
          echo "Using provided eval directory: $EVAL_DIR"
        else
          # Auto-detect: search the evals/ directory
          SEARCH_START="${GITHUB_WORKSPACE}/evals"
          if [[ -d "$SEARCH_START" ]]; then
            EVAL_DIR="$SEARCH_START"
            echo "Auto-detected eval directory: $EVAL_DIR"
          else
            echo "Error: Could not auto-detect eval directory and none provided"
            exit 1
          fi
        fi

        echo "eval-directory=$EVAL_DIR" >> $GITHUB_OUTPUT

    # Replace git+https://github.com/shared-internal-tools/prompt-evals-cli.git
    # with file:// reference to the locally checked-out CLI at $GITHUB_WORKSPACE/cli
    - name: Configure prompt-evals to use local CLI checkout
      id: replace
      uses: ./.github/actions/common/replace-git-with-local
      with:
        search-directory: ${{ steps.setup.outputs.eval-directory }}
        package-name: prompt-evals
        local-path: ${{ github.workspace }}/cli
        git-url-pattern: github.com/shared-internal-tools/prompt-evals-cli

    - name: Sync dependencies for modified projects
      if: steps.replace.outputs.files-modified != '0'
      shell: bash
      run: |
        echo "Syncing dependencies for modified projects..."
        echo ""

        SYNC_COUNT=0
        SYNC_FAILED=0

        # Iterate over each modified file and run uv sync in its directory
        while IFS= read -r PYPROJECT_FILE; do
          [[ -z "$PYPROJECT_FILE" ]] && continue

          PROJECT_DIR=$(dirname "$PYPROJECT_FILE")
          echo "Syncing: $PROJECT_DIR"

          if (cd "$PROJECT_DIR" && uv sync); then
            SYNC_COUNT=$((SYNC_COUNT + 1))
            echo "  ✓ Dependencies synced successfully"
          else
            SYNC_FAILED=$((SYNC_FAILED + 1))
            echo "  ✗ Failed to sync dependencies"
          fi

          echo ""
        done <<< "${{ steps.replace.outputs.matching-files }}"

        echo "========================================"
        echo "Dependency sync complete:"
        echo "  Successfully synced: $SYNC_COUNT project(s)"
        if [[ $SYNC_FAILED -gt 0 ]]; then
          echo "  Failed: $SYNC_FAILED project(s)"
        fi
        echo "========================================"

        if [[ $SYNC_FAILED -gt 0 ]]; then
          exit 1
        fi
