# WARNING: This file is autogenerated - changes will be overwritten when regenerated by https://github.com/microsoft/fde-mgmt
name: Pulumi Login to Azure Blob Backend
description: >
  Logs in to a Pulumi azblob:// backend. When an AFD endpoint hostname is
  provided, generates a user-delegation SAS token through Azure Front Door
  and routes traffic via AFD. Otherwise, falls back to direct blob access.
  Requires prior Azure login via azure/login@v2 and uv installed via
  astral-sh/setup-uv.

inputs:
  storage-account-name:
    description: The Azure Storage account name
    required: true
    type: string
  afd-endpoint-hostname:
    description: The Azure Front Door endpoint hostname. If empty, falls back to direct blob access.
    required: false
    default: ''
    type: string
  container-name:
    description: The blob container name for Pulumi state
    required: true
    type: string
  sas-expiry-hours:
    description: SAS token lifetime in hours (only used with AFD)
    required: false
    default: '1'

runs:
  using: composite
  steps:
    - name: Generate SAS token through AFD
      if: inputs.afd-endpoint-hostname != ''
      run: |
        SAS=$(uv run ${{ github.action_path }}/run.py)

        echo "::add-mask::$SAS"
        echo "AZURE_STORAGE_SAS_TOKEN=$SAS" >> "$GITHUB_ENV"
      env:
        AFD_HOSTNAME: ${{ inputs.afd-endpoint-hostname }}
        STORAGE_ACCOUNT: ${{ inputs.storage-account-name }}
        CONTAINER_NAME: ${{ inputs.container-name }}
        EXPIRY_HOURS: ${{ inputs.sas-expiry-hours }}
      shell: bash

    - name: Login to Pulumi backend (via AFD)
      if: inputs.afd-endpoint-hostname != ''
      run: |
        pulumi login \
          "azblob://${{ inputs.container-name }}?domain=${{ inputs.afd-endpoint-hostname }}&cdn=true" \
          --non-interactive
      shell: bash

    - name: Login to Pulumi backend (direct)
      if: inputs.afd-endpoint-hostname == ''
      run: |
        pulumi login \
          "azblob://${{ inputs.container-name }}" \
          --non-interactive
      shell: bash
