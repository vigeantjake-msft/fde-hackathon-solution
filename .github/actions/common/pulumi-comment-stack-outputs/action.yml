# WARNING: This file is autogenerated - changes will be overwritten when regenerated by https://github.com/microsoft/fde-mgmt
name: Leave comment with stack outputs
description: |
  This action is intended to be used after a Pulumi deployment step in a workflow.
  It retrieves the outputs of the deployed stack and leaves a comment on the issue or pull request that triggered the workflow.

inputs:
  pulumi-project-dir:
    description: The directory of the Pulumi project
    required: true
    type: string
  pulumi-stack-name:
    description: The name of the Pulumi stack
    required: true
    type: string
  github-token:
    description: GitHub token with permissions to comment on the pull request
    required: true
    type: string
  issue-number:
    description: The number of the issue to comment on. If not provided, the action will attempt to find a pull request associated with the commit that triggered the workflow.
    required: false
    type: string

runs:
  using: composite
  steps:
    - name: Get project name
      id: project
      run: |
        echo "name=$(yq '.name' < $PULUMI_YAML_FILEPATH)" >> $GITHUB_OUTPUT
      env:
        PULUMI_YAML_FILEPATH: ${{ github.workspace }}/${{ inputs.pulumi-project-dir }}/Pulumi.yml
      shell: bash

    - name: Make comment content
      working-directory: ${{ inputs.pulumi-project-dir }}
      run: |
        touch comment.md

        echo "<p align=\"center\">" >> comment.md
        echo "<img src=\"https://www.pulumi.com/images/logo/logo-on-white-box.svg?\" width=\"150\">" >> comment.md
        echo "</p>" >> comment.md
        echo "" >> comment.md
        echo "# Deployment Succeeded" >> comment.md
        echo "" >> comment.md
        echo "## \`$PULUMI_PROJECT_NAME-$PULUMI_STACK_NAME\` @ $GITHUB_SHA" >> comment.md
        echo "" >> comment.md
        echo "### Stack Outputs" >> comment.md
        echo "" >> comment.md
        echo '```' >> comment.md
        pulumi stack output --json >> comment.md
        echo '```' >> comment.md
      env:
        PULUMI_PROJECT_NAME: ${{ steps.project.outputs.name }}
        PULUMI_STACK_NAME: ${{ inputs.pulumi-stack-name }}
      shell: bash

    - name: Comment on issue
      if: ${{ inputs.issue-number != '' }}
      working-directory: ${{ inputs.pulumi-project-dir }}
      run: |
        gh issue comment $ISSUE_NUMBER --body-file comment.md
      env:
        ISSUE_NUMBER: ${{ inputs.issue-number }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
      shell: bash

    - name: Comment on pull request
      if: ${{ inputs.issue-number == '' }}
      working-directory: ${{ inputs.pulumi-project-dir }}
      run: |
        pr_number=$(gh api /repos/$GITHUB_REPOSITORY/commits/$GITHUB_SHA/pulls | jq '.[0].number')
        gh pr comment $pr_number --body-file comment.md
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
      shell: bash
