# pre-commit is a framework for managing and maintaining multi-language pre-commit hooks: https://pre-commit.com/
default_language_version:
  python: python3.12

# BEGIN MICROSOFT-FDE BLOCK
# WARNING: This section is autogenerated - changes will be overwritten when regenerated by https://github.com/microsoft/fde-mgmt
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-json
        name: '[.] check json'
        exclude: '\.vscode/mcp\.json$'
      - id: check-toml
        name: '[.] check toml'
      - id: check-yaml
        name: '[.] check yaml'
      - id: end-of-file-fixer
        name: '[.] end of file fixer'
        exclude: '(\.enc$|ts/(.*/)?libs/api-client-.*/.*)'  # encrypted binary files + generated API clients
      - id: trailing-whitespace
        name: '[.] trailing whitespace'
        exclude: '(\.ambr$|ts/(.*/)?libs/api-client-.*/.*)'  # syrupy snapshot files + generated API clients
      - id: pretty-format-json
        name: '[.] format json'
        args:
          - --autofix
          - --indent=4
          - --no-sort-keys
        exclude: '(tsconfig.*\.json|\.vscode/mcp\.json)$'

  - repo: local
    hooks:
      - id: sync-copilot-instructions
        name: '[.] sync copilot instructions'
        entry: tools/scripts/sync-copilot-instructions.sh
        language: system
        pass_filenames: false
        always_run: true

      - id: sync-workspace-members
        name: '[.] sync workspace members'
        entry: tools/scripts/sync-workspace-members.py
        language: python
        pass_filenames: false
        always_run: true

      - id: sync-vscode-workspace
        name: '[.] sync vscode workspace'
        entry: tools/scripts/sync-vscode-workspace.py
        language: python
        pass_filenames: false
        always_run: true

      # Runs after sync-copilot-instructions to verify links in generated instruction files
      - id: verify-markdown-links
        name: '[.] verify markdown links'
        entry: tools/scripts/verify-markdown-links.py
        language: python
        pass_filenames: false
        always_run: true

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.10
    hooks:
      - id: ruff-format
        name: '[py] format'
        args:
          - --config
          - ruff.toml

      - id: ruff-check
        name: '[py] lint'
        args:
          - --fix
          - --config
          - ruff.toml

  - repo: local
    hooks:
      - id: py-dont-allow-all-exports
        name: '[py] disallow __all__'
        entry: tools/scripts/py-dont-allow-all-exports.sh
        language: system
        types:
          - python

      - id: py-validate-noqa-justifications
        name: '[py] validate noqa justifications'
        entry: tools/scripts/py-validate-noqa-justifications.py
        language: python
        types:
          - python

      - id: py-dont-allow-requirements-txt
        name: '[py] disallow requirements.txt'
        language: fail
        entry: Usage of requirements.txt is not allowed; use uv to manage dependencies.
        files: requirements.txt

      - id: py-validate-project-directories
        name: '[py] validate project directories'
        entry: tools/scripts/py-validate-project-directories.py
        language: python
        pass_filenames: false
        always_run: true

      - id: py-validate-min-release-age
        name: '[py] validate minimum release age'
        entry: tools/scripts/py-validate-min-release-age.py
        language: python
        files: uv.lock
        additional_dependencies:
          - packaging
          - requests

      - id: ts-dont-allow-package-lock-json
        name: '[ts] disallow package-lock.json'
        language: fail
        entry: Usage of package-lock.json is not allowed; use pnpm to manage dependencies.
        files: package-lock.json

      - id: ts-dont-allow-yarn-lock
        name: '[ts] disallow yarn.lock'
        language: fail
        entry: Usage of yarn.lock is not allowed; use pnpm to manage dependencies.
        files: yarn.lock

      - id: ts-validate-project-directories
        name: '[ts] validate project directories'
        entry: tools/scripts/ts-validate-project-directories.py
        language: python
        pass_filenames: false
        always_run: true

      - id: github-actions-validate-job-permissions
        name: '[github] validate job permissions'
        entry: tools/scripts/github-actions-validate-job-permissions.py
        language: python
        files: ^\.github/workflows/.*\.ya?ml$
        additional_dependencies:
          - PyYAML

      - id: pulumi-update-project-options
        name: '[pulumi] update project options'
        entry: tools/scripts/pulumi-update-project-options.py
        language: python
        pass_filenames: false
        files: (^infra/projects/|^\.github/workflows/pulumi-)

      - id: ai-validate-skills
        name: '[ai] validate skills'
        entry: tools/scripts/ai-validate-skills.py
        additional_dependencies:
          - skills-ref
        language: python
        files: SKILL.md
# END MICROSOFT-FDE BLOCK
